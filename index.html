<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRI Board Skills Self-Assessment &amp; Review</title>
<style>
:root{
 --magenta:#AB013E; --magenta-dk:#8a0132; --magenta-soft:#fbe9ef;
 --teal:#006474; --teal-dk:#004e5a; --teal-soft:#e3eff1;
 --green:#99B52B; --green-dk:#6f8a1c;
 --ink:#23282b; --muted:#5f666b; --line:#e2e5e8;
 --bg:#f3f4f5; --card:#ffffff;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
 font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%;}
.stickytop{position:sticky;top:0;z-index:100;background:#fff;box-shadow:0 3px 12px rgba(0,0,0,.07);}
.topbar{height:6px;background:linear-gradient(90deg,var(--green) 0 34%,var(--teal) 34% 67%,var(--magenta) 67% 100%);}
.hdr{background:#fff;border-bottom:1px solid var(--line);padding:13px 20px;
 display:flex;align-items:center;gap:15px;flex-wrap:wrap;}
.logo{height:38px;width:auto;display:block;}
.hdr-meta{flex:1;min-width:170px;}
.hdr-eyebrow{font-size:10px;letter-spacing:.14em;color:var(--magenta);font-weight:800;}
.hdr-title{font-size:14.5px;font-weight:800;color:var(--ink);line-height:1.3;}
.confidential{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal-dk);
 border:1px solid var(--teal);border-radius:20px;padding:3px 10px;font-weight:800;white-space:nowrap;}
.progresswrap{max-width:780px;margin:0 auto;padding:13px 20px 13px;}
.progress-meta{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);
 margin-bottom:6px;font-weight:700;letter-spacing:.01em;}
.progress-track{height:7px;background:#e6e8ea;border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--green));
 border-radius:4px;transition:width .3s ease;}
main{max-width:780px;margin:0 auto;padding:18px 20px 36px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:16px;}
.page-head{margin:4px 2px 16px;}
.eyebrow{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--magenta);
 font-weight:800;margin-bottom:5px;}
.page-title{font-size:23px;font-weight:800;color:var(--ink);line-height:1.25;margin:0 0 7px;}
.page-sub{font-size:14px;color:var(--muted);line-height:1.55;margin:0;}
.tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.03em;
 padding:5px 12px;border-radius:20px;margin-bottom:13px;}
.tag-teal{background:var(--teal-soft);color:var(--teal-dk);}
.lead{font-size:15px;line-height:1.62;color:#3a4045;margin:0 0 15px;}
.time-chip{display:inline-block;font-size:12.5px;color:var(--teal-dk);background:var(--teal-soft);
 border-radius:7px;padding:8px 12px;font-weight:700;}
.card-h2{font-size:16px;font-weight:800;color:var(--ink);margin:0 0 8px;}
.muted-p{font-size:13px;color:var(--muted);line-height:1.55;margin:0 0 12px;}
.scale-row{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-top:1px solid var(--line);}
.scale-row:first-of-type{border-top:none;padding-top:2px;}
.scale-num{flex:none;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;
 justify-content:center;font-weight:800;color:#fff;font-size:15px;}
.scale-num.n0{background:#9aa1a7;} .scale-num.n1{background:#5fa1ab;}
.scale-num.n2{background:var(--teal);} .scale-num.n3{background:var(--green);}
.scale-text{display:flex;flex-direction:column;gap:1px;}
.scale-text b{font-size:14px;color:var(--ink);}
.scale-text span{font-size:13px;color:var(--muted);line-height:1.45;}
.field-label{display:block;font-weight:800;font-size:14px;margin-bottom:7px;color:var(--ink);line-height:1.4;}
.req{color:var(--magenta);font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;}
.opt-tag{color:var(--muted);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.text-input,.text-area{width:100%;font:inherit;font-size:14.5px;color:var(--ink);
 border:1.5px solid var(--line);border-radius:8px;padding:11px 12px;}
.text-input:focus,.text-area:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft);}
.text-area{resize:vertical;min-height:100px;line-height:1.5;}
.select-input{appearance:none;-webkit-appearance:none;cursor:pointer;background-color:#fff;
 background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14"><path d="M3 5l4 4 4-4" stroke="%235f666b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>');
 background-repeat:no-repeat;background-position:right 13px center;padding-right:40px;}
.field-err{color:var(--magenta);font-size:12.5px;font-weight:700;margin-top:6px;}
.help-p{font-size:13px;color:var(--muted);margin:-1px 0 9px;line-height:1.5;}
.legend{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);
 background:#fff;border:1px solid var(--line);border-radius:20px;padding:4px 11px 4px 4px;font-weight:600;}
.legend-num{flex:none;width:18px;height:18px;border-radius:50%;background:var(--teal-soft);
 color:var(--teal-dk);font-weight:800;font-size:10.5px;display:flex;align-items:center;justify-content:center;}
.skill{background:var(--card);border:1px solid var(--line);border-radius:11px;
 padding:16px 17px;margin-bottom:14px;}
.skill.missing{border-color:var(--magenta);box-shadow:0 0 0 3px var(--magenta-soft);}
.skill-top{display:flex;gap:9px;align-items:baseline;}
.skill-id{flex:none;background:var(--teal);color:#fff;font-weight:800;font-size:11.5px;
 padding:2px 7px;border-radius:5px;}
.skill-name{font-weight:800;font-size:15.5px;color:var(--ink);line-height:1.35;}
.skill-def{font-size:13px;color:var(--muted);line-height:1.55;margin:6px 0 13px;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;gap:12px;width:100%;text-align:left;background:#fff;
 border:1.5px solid var(--line);border-radius:9px;padding:11px 13px;cursor:pointer;
 align-items:flex-start;font:inherit;color:var(--ink);transition:border-color .12s,background .12s;}
.opt:hover{border-color:#c2c7cc;}
.opt:focus-visible{outline:2px solid var(--teal);outline-offset:1px;}
.opt.sel{border-color:var(--magenta);background:var(--magenta-soft);}
.opt-num{flex:none;width:26px;height:26px;border-radius:50%;background:#eceef0;
 color:var(--muted);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;}
.opt.sel .opt-num{background:var(--magenta);color:#fff;}
.opt-body{display:flex;flex-direction:column;gap:2px;}
.opt-label{font-weight:800;font-size:13.5px;}
.opt.sel .opt-label{color:var(--magenta);}
.opt-anchor{font-size:13.5px;color:var(--muted);line-height:1.5;}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:6px;align-items:center;}
.btn{font:inherit;font-weight:800;font-size:14px;border-radius:8px;padding:11px 22px;
 cursor:pointer;border:1.5px solid transparent;transition:background .12s,border-color .12s;}
.btn-primary{background:var(--magenta);color:#fff;}
.btn-primary:hover{background:var(--magenta-dk);}
.btn-ghost{background:#fff;border-color:var(--line);color:var(--ink);}
.btn-ghost:hover{border-color:#bcc1c6;}
.btn[disabled]{opacity:.45;cursor:not-allowed;}
.btn-text{background:none;border:none;color:var(--teal-dk);text-decoration:underline;
 font-weight:700;padding:11px 4px;cursor:pointer;font-size:13px;}
.btn-link{background:none;border:none;color:var(--teal-dk);font-weight:800;
 text-decoration:underline;cursor:pointer;font-size:12.5px;padding:3px 4px;}
.review-block{padding:16px 18px;}
.review-head{display:flex;justify-content:space-between;align-items:center;
 gap:12px;margin-bottom:8px;}
.review-head h3{font-size:14.5px;font-weight:800;color:var(--teal-dk);margin:0;}
.review-row{display:flex;justify-content:space-between;align-items:center;gap:12px;}
.review-skill{display:flex;justify-content:space-between;gap:12px;padding:7px 0;
 border-top:1px solid #eef0f1;font-size:13px;}
.review-skill:first-of-type{border-top:none;}
.rs-name{color:var(--ink);} .rs-name b{color:var(--teal-dk);}
.rs-score{flex:none;font-weight:800;color:var(--ink);white-space:nowrap;}
.rs-score.rs-missing{color:var(--magenta);}
.review-q{padding:9px 0;border-top:1px solid #eef0f1;}
.review-q:first-of-type{border-top:none;}
.review-k{font-size:12.5px;font-weight:800;color:var(--muted);margin-bottom:3px;}
.review-v{font-size:13.5px;color:var(--ink);line-height:1.55;white-space:pre-wrap;}
.missing-v{color:var(--magenta);font-weight:800;}
.muted{color:var(--muted);}
.alert{border-radius:9px;padding:13px 15px;font-size:13.5px;margin-bottom:16px;line-height:1.55;}
.alert-warn{background:#fdeee2;border:1px solid #f0c89a;color:#8a4a13;}
.alert-err{background:var(--magenta-soft);border:1px solid #e8b6c6;color:var(--magenta-dk);}
.submit-card{text-align:center;padding:10px;}
.center-card{text-align:center;padding:40px 24px;}
.done-mark{width:64px;height:64px;border-radius:50%;background:var(--green);color:#fff;
 font-size:34px;line-height:64px;margin:0 auto 18px;font-weight:800;}
.center-card h1{font-size:22px;color:var(--ink);margin:0 0 11px;font-weight:800;}
.center-card p{font-size:14.5px;color:var(--muted);line-height:1.62;max-width:460px;margin:0 auto;}
.spinner{width:34px;height:34px;border:3px solid var(--teal-soft);border-top-color:var(--teal);
 border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px;}
.ftr{text-align:center;padding:20px 20px 30px;}
.ftr-tag{font-style:italic;font-size:12.5px;color:#8b9197;}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
 background:var(--ink);color:#fff;font-size:13px;font-weight:700;padding:11px 18px;
 border-radius:8px;opacity:0;transition:.25s;pointer-events:none;z-index:50;max-width:90vw;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:560px){
 main{padding:14px 14px 30px;} .card{padding:16px;}
 .hdr{padding:11px 14px;gap:11px;} .confidential{display:none;}
 .page-title{font-size:20px;} .progresswrap{padding:11px 14px 11px;}
 .btn{padding:11px 16px;}
}
</style>
</head>

var LS_KEY = "cri_board_skills_assessment_v1";
var NCATS = SURVEY.cats.length;
var TOTAL = NCATS + 3;
var app = document.getElementById("app");
var errMsg = "";
var submitting = false;

var state = {name:"",scores:{},q2:"",q3:"",q4:"",page:0,started:""};

function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function isConfigured(){return /script\.google\.com/.test(SCRIPT_URL);}

function load(){
 try{
  var raw=localStorage.getItem(LS_KEY);
  if(raw){
   var s=JSON.parse(raw);
   if(s&&typeof s==="object"){
    if(typeof s.name==="string")state.name=s.name;
    if(s.scores&&typeof s.scores==="object")state.scores=s.scores;
    if(typeof s.q2==="string")state.q2=s.q2;
    if(typeof s.q3==="string")state.q3=s.q3;
    if(typeof s.q4==="string")state.q4=s.q4;
    if(typeof s.page==="number")state.page=s.page;
    if(typeof s.started==="string")state.started=s.started;
   }
  }
 }catch(e){}
 if(typeof state.page!=="number"||state.page<0||state.page>NCATS+2)state.page=0;
 if(!state.started)state.started=new Date().toISOString();
}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify({name:state.name,scores:state.scores,q2:state.q2,q3:state.q3,q4:state.q4,page:state.page,started:state.started}));}catch(e){}}
function clearSaved(){try{localStorage.removeItem(LS_KEY);}catch(e){}}
function hasSaved(){try{return !!localStorage.getItem(LS_KEY);}catch(e){return false;}}

function allSkills(){
 var out=[];
 for(var c=0;c<SURVEY.cats.length;c++){
  var sk=SURVEY.cats[c].skills;
  for(var i=0;i<sk.length;i++)out.push(sk[i]);
 }
 return out;
}
function answeredCount(){
 var n=0,sk=allSkills();
 for(var i=0;i<sk.length;i++)if(state.scores[sk[i].id]!=null)n++;
 return n;
}
function collectMissing(){
 var m=[];
 if(!String(state.name).trim())m.push("your name");
 var sk=allSkills(),un=0;
 for(var i=0;i<sk.length;i++)if(state.scores[sk[i].id]==null)un++;
 if(un>0)m.push(un+" unrated skill"+(un>1?"s":""));
 for(var j=0;j<SURVEY.board.length;j++){
  var q=SURVEY.board[j];
  if(q.required&&!String(state[q.key]||"").trim())m.push('the question "'+q.label+'"');
 }
 return m;
}

/* ---------- render ---------- */
function render(){
 var p=state.page,h;
 if(p==="submitting")h=viewSubmitting();
 else if(p==="done")h=viewDone();
 else if(p==="error")h=viewError();
 else if(p===0)h=viewWelcome();
 else if(p>=1&&p<=NCATS)h=viewCategory(p-1);
 else if(p===NCATS+1)h=viewBoard();
 else h=viewReview();
 app.innerHTML=h;
 updateProgress();
 window.scrollTo(0,0);
}
function stepLabel(p){
 if(p===0)return "Getting started";
 if(p>=1&&p<=NCATS)return SURVEY.cats[p-1].name;
 if(p===NCATS+1)return "Your read on the board";
 return "Review & submit";
}
function updateProgress(){
 var pw=document.getElementById("progresswrap");
 var p=state.page;
 if(typeof p!=="number"){pw.style.display="none";return;}
 pw.style.display="";
 var step=p+1;
 document.getElementById("stepLabel").textContent="Step "+step+" of "+TOTAL+"  \u00b7  "+stepLabel(p);
 var pct=Math.round(step/TOTAL*100);
 document.getElementById("stepPct").textContent=pct+"%";
 document.getElementById("progressFill").style.width=pct+"%";
}

 if(toastTimer)clearTimeout(toastTimer);
 toastTimer=setTimeout(function(){t.classList.remove("show");},3200);
}

   else if(ee)ee.textContent="";
  }
  if(firstE){firstE.scrollIntoView({behavior:"smooth",block:"center"});firstE.focus();return;}
 }
 state.page=p+1;save();render();
}
function doBack(){
 if(typeof state.page==="number"&&state.page>0){state.page--;save();render();}
}
function doReset(){
 if(confirm("Start over? This permanently clears the answers saved on this device.")){
  clearSaved();
  state={name:"",scores:{},q2:"",q3:"",q4:"",page:0,started:new Date().toISOString()};
  render();
 }
}
function selectOption(btn){
 var id=btn.getAttribute("data-skill"),val=parseInt(btn.getAttribute("data-val"),10);
 state.scores[id]=val;save();
 var group=btn.parentNode,opts=group.getElementsByClassName("opt");
 for(var i=0;i<opts.length;i++){
  var on=(opts[i]===btn);
  opts[i].classList.toggle("sel",on);
  opts[i].setAttribute("aria-checked",on?"true":"false");
 }
 var sk=document.getElementById("skill-"+id);if(sk)sk.classList.remove("missing");
}
function downloadCopy(){
 var L=[];
 L.push(SURVEY.title);
 L.push("Respondent: "+(String(state.name).trim()||"(not entered)"));
 L.push("Saved: "+new Date().toLocaleString());
 L.push("");
 for(var c=0;c<SURVEY.cats.length;c++){
  var cat=SURVEY.cats[c];
  L.push("== "+cat.name+" ==");
  for(var i=0;i<cat.skills.length;i++){
   var s=cat.skills[i],v=state.scores[s.id];
   L.push("  "+s.id+"  "+s.name+":  "+(v!=null?(v+" "+SURVEY.scale[v].label):"(not answered)"));
  }
  L.push("");
 }
 L.push("== Your read on the board ==");
 for(var j=0;j<SURVEY.board.length;j++){
  var q=SURVEY.board[j];
  L.push(q.label);
  L.push("  "+(String(state[q.key]||"").trim()||"(blank)"));
  L.push("");
 }
 var blob=new Blob([L.join("\n")],{type:"text/plain"});
 var a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="CRI Board Skills Assessment - "+(String(state.name).trim()||"draft").replace(/[^a-z0-9 ]/gi,"")+".txt";
 document.body.appendChild(a);a.click();document.body.removeChild(a);
 toast("A copy was downloaded.");
}
function buildPayload(){
 var headers=["Name"],values=[String(state.name).trim()];
 var sk=allSkills();
 for(var i=0;i<sk.length;i++){
  headers.push(sk[i].id+" "+sk[i].name);
  var v=state.scores[sk[i].id];
  values.push(v==null?"":v);
 }
 for(var j=0;j<SURVEY.board.length;j++){
  headers.push(SURVEY.board[j].col);
  values.push(String(state[SURVEY.board[j].key]||"").trim());
 }
 return {headers:headers,values:values,started:state.started,submitted:new Date().toISOString()};
}
function showError(msg){errMsg=msg;state.page="error";render();}
function doSubmit(){
 if(submitting)return;
 if(collectMissing().length){render();return;}
 if(!isConfigured()){
  showError("This form is not connected to its response sheet yet. (Administrator: paste the Google Apps Script web app URL into index.html, then redeploy.)");
  return;
 }
 submitting=true;state.page="submitting";render();
 var payload=buildPayload();
 fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(payload)})
  .then(function(r){return r.json().catch(function(){return {result:"success"};});})
  .then(function(d){
   submitting=false;
   if(d&&d.result==="error"){showError("The response sheet reported an error: "+(d.message||"unknown")+". Your answers are still saved on this device.");}
   else{clearSaved();state.page="done";render();}
  })
  .catch(function(){
   submitting=false;
   showError("Your answers could not be sent right now. They are still saved on this device. Download a backup copy and try submitting again.");
  });
}

/* ---------- events ---------- */
app.addEventListener("click",function(e){
 var opt=e.target.closest&&e.target.closest(".opt");
 if(opt){selectOption(opt);return;}
 var g=e.target.closest&&e.target.closest("[data-goto]");
 if(g){var n=parseInt(g.getAttribute("data-goto"),10);if(!isNaN(n)){state.page=n;save();render();}return;}
 var a=e.target.closest&&e.target.closest("[data-act]");
 if(!a)return;
 var act=a.getAttribute("data-act");
 if(act==="next")doNext();
 else if(act==="back")doBack();
 else if(act==="reset")doReset();
 else if(act==="download")downloadCopy();
 else if(act==="submit")doSubmit();
 else if(act==="retry"){state.page=NCATS+2;render();}
});
app.addEventListener("input",function(e){
 var t=e.target;
 if(t.id&&t.id.indexOf("ta_")===0){
  var key=t.id.slice(3);state[key]=t.value;save();
  var ek=document.getElementById("err_"+key);if(ek)ek.textContent="";
 }
});
app.addEventListener("change",function(e){
 if(e.target.id==="nameInput"){
  state.name=e.target.value;save();
  var en=document.getElementById("err_name");if(en)en.textContent="";
 }
});

load();render();
</script>
</body>
</html>
